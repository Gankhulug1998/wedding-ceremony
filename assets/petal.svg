<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="ground" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="55%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </radialGradient>
    <linearGradient id="petalFill" x1="32%" y1="6%" x2="74%" y2="96%">
      <stop offset="0%" stop-color="#c8a96f"/>
      <stop offset="42%" stop-color="#e3cfc7"/>
      <stop offset="100%" stop-color="#b18f5a"/>
    </linearGradient>
    <linearGradient id="petalSheen" x1="20%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#fffefb" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#fffefb" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.145  0 0 0 0 0.12  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- soft gradient ground -->
  <rect x="0" y="0" width="120" height="120" fill="url(#ground)"/>

  <!-- whisper-soft nostalgic grain -->
  <rect x="0" y="0" width="120" height="120" filter="url(#grain)" opacity="0.5"/>

  <!-- thin inset gold frame ~24px... using slim margin for small canvas -->
  <rect x="9" y="9" width="102" height="102" fill="none" stroke="#c8a96f" stroke-width="0.6" opacity="0.7"/>
  <rect x="11.5" y="11.5" width="97" height="97" fill="none" stroke="#e2d7c5" stroke-width="0.4" opacity="0.6"/>

  <!-- single soft rose petal: smooth teardrop / curved shape -->
  <g>
    <path d="M60 24
             C 78 38, 86 58, 80 78
             C 75 94, 64 100, 60 100
             C 56 100, 45 94, 40 78
             C 34 58, 42 38, 60 24 Z"
          fill="url(#petalFill)"/>
    <!-- gentle sheen highlight -->
    <path d="M60 24
             C 78 38, 86 58, 80 78
             C 75 94, 64 100, 60 100
             C 56 100, 45 94, 40 78
             C 34 58, 42 38, 60 24 Z"
          fill="url(#petalSheen)"/>
    <!-- soft outline -->
    <path d="M60 24
             C 78 38, 86 58, 80 78
             C 75 94, 64 100, 60 100
             C 56 100, 45 94, 40 78
             C 34 58, 42 38, 60 24 Z"
          fill="none" stroke="#b18f5a" stroke-width="0.7" opacity="0.55"/>
    <!-- faint center vein -->
    <path d="M60 30 C 61 50, 60 72, 60 96"
          fill="none" stroke="#29251f" stroke-width="0.5" stroke-linecap="round" opacity="0.18"/>
    <!-- subtle side veins -->
    <path d="M60 48 C 67 56, 71 64, 72 74" fill="none" stroke="#29251f" stroke-width="0.35" stroke-linecap="round" opacity="0.1"/>
    <path d="M60 48 C 53 56, 49 64, 48 74" fill="none" stroke="#29251f" stroke-width="0.35" stroke-linecap="round" opacity="0.1"/>
  </g>
</svg>
