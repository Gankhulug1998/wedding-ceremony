<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ground" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="55%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a96f"/>
      <stop offset="100%" stop-color="#b18f5a"/>
    </linearGradient>
    <radialGradient id="petalFill" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </radialGradient>
    <radialGradient id="roseFill" cx="48%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#e3cfc7"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.05 0"/>
    </filter>
    <!-- Зураг-дэвсгэр салгах зөөлөн дулаан мат -->
    <radialGradient id="mat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dcc9a4" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#d8c5a0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d8c5a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="matblur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Ground -->
  <rect x="0" y="0" width="800" height="1000" fill="url(#ground)"/>
  <rect x="0" y="0" width="800" height="1000" filter="url(#grain)"/>

  <!-- Inset frame -->
  <rect x="24" y="24" width="752" height="952" fill="none" stroke="url(#goldStroke)" stroke-width="1"/>
  <rect x="32" y="32" width="736" height="936" fill="none" stroke="#e2d7c5" stroke-width="1"/>

  <!-- Sparse faint dot texture -->
  <g fill="#b18f5a" opacity="0.05">
    <circle cx="160" cy="180" r="2"/>
    <circle cx="640" cy="230" r="2"/>
    <circle cx="120" cy="560" r="2"/>
    <circle cx="690" cy="640" r="2"/>
    <circle cx="220" cy="860" r="2"/>
    <circle cx="600" cy="840" r="2"/>
    <circle cx="400" cy="120" r="2"/>
  </g>

  <!-- Зөөлөн дулаан мат — баглааг дэвсгэрээс ялгаруулна -->
  <ellipse cx="400" cy="470" rx="210" ry="260" fill="url(#mat)" filter="url(#matblur)"/>

  <!-- ===================== BOUQUET ===================== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Eucalyptus sprigs (background, behind blooms) -->
    <g stroke="#9a7b44" stroke-width="1.4" opacity="0.85">
      <!-- left sprig -->
      <path d="M300 360 C240 320 200 270 185 210"/>
      <g fill="url(#petalFill)" stroke="#9a7b44" stroke-width="1">
        <ellipse cx="270" cy="338" rx="13" ry="8" transform="rotate(-35 270 338)"/>
        <ellipse cx="244" cy="312" rx="13" ry="8" transform="rotate(-40 244 312)"/>
        <ellipse cx="222" cy="282" rx="12" ry="7.5" transform="rotate(-48 222 282)"/>
        <ellipse cx="205" cy="250" rx="11" ry="7" transform="rotate(-55 205 250)"/>
        <ellipse cx="192" cy="222" rx="9" ry="6" transform="rotate(-62 192 222)"/>
      </g>
      <!-- right sprig -->
      <path d="M505 360 C565 318 608 268 626 206"/>
      <g fill="url(#petalFill)" stroke="#9a7b44" stroke-width="1">
        <ellipse cx="536" cy="336" rx="13" ry="8" transform="rotate(35 536 336)"/>
        <ellipse cx="563" cy="308" rx="13" ry="8" transform="rotate(42 563 308)"/>
        <ellipse cx="586" cy="278" rx="12" ry="7.5" transform="rotate(50 586 278)"/>
        <ellipse cx="604" cy="246" rx="11" ry="7" transform="rotate(58 604 246)"/>
        <ellipse cx="617" cy="218" rx="9" ry="6" transform="rotate(64 617 218)"/>
      </g>
      <!-- upper center sprig -->
      <path d="M400 320 C398 270 402 215 400 170"/>
      <g fill="url(#petalFill)" stroke="#9a7b44" stroke-width="1">
        <ellipse cx="378" cy="300" rx="11" ry="7" transform="rotate(-75 378 300)"/>
        <ellipse cx="422" cy="290" rx="11" ry="7" transform="rotate(75 422 290)"/>
        <ellipse cx="380" cy="258" rx="11" ry="7" transform="rotate(-78 380 258)"/>
        <ellipse cx="420" cy="248" rx="11" ry="7" transform="rotate(78 420 248)"/>
        <ellipse cx="385" cy="214" rx="10" ry="6.5" transform="rotate(-80 385 214)"/>
        <ellipse cx="415" cy="206" rx="10" ry="6.5" transform="rotate(80 415 206)"/>
        <ellipse cx="400" cy="172" rx="9" ry="6" transform="rotate(0 400 172)"/>
      </g>
    </g>

    <!-- Peony (left bloom) -->
    <g stroke="#9a7b44" stroke-width="1.5">
      <circle cx="300" cy="400" r="78" fill="url(#petalFill)"/>
      <path d="M300 400 C275 365 245 372 250 405 C228 392 218 422 245 432 C228 460 262 478 282 452 C290 484 322 480 320 448 C350 462 366 430 338 416 C362 396 344 364 318 380 C312 348 282 352 290 384" stroke-width="1.2" fill="none"/>
      <path d="M300 400 C290 388 285 392 286 402 C278 398 276 410 286 412 C282 422 296 426 300 414 C306 424 318 418 312 408 C320 404 314 392 304 396 Z" stroke-width="1" fill="none"/>
      <path d="M232 388 C210 372 200 392 222 404" stroke-width="1"/>
      <path d="M368 388 C390 372 400 392 378 404" stroke-width="1"/>
      <path d="M300 478 C290 502 312 502 300 478" stroke-width="1"/>
    </g>

    <!-- Rose (right bloom) -->
    <g stroke="#9a7b44" stroke-width="1.5">
      <circle cx="510" cy="410" r="74" fill="url(#roseFill)"/>
      <path d="M510 410 C522 392 545 398 540 418 C560 412 566 438 545 444 C556 466 530 478 518 458 C512 482 486 478 492 456 C470 462 462 438 482 430 C466 414 482 392 500 404 C500 384 522 386 510 408" stroke-width="1.2" fill="none"/>
      <path d="M510 410 C502 400 496 404 500 414 C492 414 494 426 504 424 C504 434 518 432 516 422 C526 420 524 408 514 410 C516 400 506 398 504 408" stroke-width="1" fill="none"/>
      <ellipse cx="510" cy="410" rx="6" ry="6" stroke-width="1"/>
    </g>

    <!-- Peony (center, foreground, largest) -->
    <g stroke="#9a7b44" stroke-width="1.6">
      <circle cx="400" cy="470" r="92" fill="url(#petalFill)"/>
      <path d="M400 470 C368 425 328 435 336 478 C306 462 294 502 330 514 C306 552 352 574 378 540 C388 582 430 576 426 534 C466 552 488 510 452 494 C484 466 460 424 426 444 C420 400 378 408 388 452" stroke-width="1.3" fill="none"/>
      <path d="M400 470 C385 452 372 458 378 476 C362 472 360 492 378 494 C372 510 396 516 402 498 C412 514 432 506 422 490 C438 484 430 462 412 470 C414 448 388 446 388 466 Z" stroke-width="1.1" fill="none"/>
      <path d="M400 470 C392 460 386 463 389 472 C381 470 380 482 390 482 C387 492 401 494 403 484 C410 492 421 486 414 478 C422 475 417 464 408 468 Z" stroke-width="1" fill="none"/>
      <path d="M318 448 C292 430 280 454 306 470" stroke-width="1"/>
      <path d="M482 448 C508 430 520 454 494 470" stroke-width="1"/>
    </g>

    <!-- Lower side eucalyptus -->
    <g stroke="#9a7b44" stroke-width="1.4" opacity="0.85">
      <path d="M335 560 C285 580 245 610 230 660"/>
      <g fill="url(#petalFill)" stroke="#9a7b44" stroke-width="1">
        <ellipse cx="305" cy="572" rx="12" ry="7.5" transform="rotate(25 305 572)"/>
        <ellipse cx="278" cy="592" rx="12" ry="7.5" transform="rotate(32 278 592)"/>
        <ellipse cx="256" cy="618" rx="11" ry="7" transform="rotate(40 256 618)"/>
        <ellipse cx="240" cy="646" rx="10" ry="6.5" transform="rotate(48 240 646)"/>
      </g>
      <path d="M470 560 C520 580 560 610 575 660"/>
      <g fill="url(#petalFill)" stroke="#9a7b44" stroke-width="1">
        <ellipse cx="500" cy="572" rx="12" ry="7.5" transform="rotate(-25 500 572)"/>
        <ellipse cx="527" cy="592" rx="12" ry="7.5" transform="rotate(-32 527 592)"/>
        <ellipse cx="549" cy="618" rx="11" ry="7" transform="rotate(-40 549 618)"/>
        <ellipse cx="565" cy="646" rx="10" ry="6.5" transform="rotate(-48 565 646)"/>
      </g>
    </g>

    <!-- Stems gathered -->
    <g stroke="#9a7b44" stroke-width="1.6">
      <path d="M300 478 C340 560 372 620 388 700"/>
      <path d="M400 562 C400 630 402 690 402 760"/>
      <path d="M510 484 C470 560 432 620 416 700"/>
      <path d="M360 540 C376 600 384 660 396 720"/>
      <path d="M448 540 C432 600 420 660 408 720"/>
    </g>

    <!-- Ribbon binding -->
    <g stroke="url(#goldStroke)" stroke-width="2">
      <path d="M360 700 C385 686 415 686 444 700 C420 716 384 716 360 700 Z" fill="#efe7da"/>
      <path d="M360 712 C385 698 415 698 444 712 C420 728 384 728 360 712 Z" fill="#f5f1ea"/>
    </g>

    <!-- Flowing ribbon tails -->
    <g stroke="url(#goldStroke)" stroke-width="1.8" fill="#efe7da" opacity="0.95">
      <path d="M392 720 C360 770 372 820 340 858 C326 836 332 800 352 770 C338 800 332 836 350 866 C374 826 386 776 408 728 Z"/>
      <path d="M412 720 C448 770 440 820 472 858 C486 834 478 800 458 770 C474 800 480 836 462 866 C436 824 424 774 400 728 Z"/>
      <path d="M402 722 C402 780 400 836 400 892 C392 870 392 840 396 812 C400 840 400 870 404 892 Z"/>
    </g>

    <!-- Small filler buds -->
    <g stroke="#9a7b44" stroke-width="1.2" fill="url(#roseFill)" opacity="0.9">
      <circle cx="358" cy="372" r="14"/>
      <path d="M358 372 C351 366 354 380 358 372" stroke-width="0.9" fill="none"/>
      <circle cx="448" cy="378" r="13"/>
      <path d="M448 378 C441 372 444 386 448 378" stroke-width="0.9" fill="none"/>
      <circle cx="340" cy="486" r="12"/>
      <circle cx="466" cy="486" r="12"/>
    </g>

  </g>
</svg>
