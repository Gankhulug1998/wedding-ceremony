<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ground" cx="50%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="40%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a96f" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#c8a96f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c8a96f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e3cfc7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e3cfc7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7da"/>
      <stop offset="55%" stop-color="#c8a96f"/>
      <stop offset="100%" stop-color="#b18f5a"/>
    </linearGradient>
    <linearGradient id="wax" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 1 0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- ground -->
  <rect width="800" height="1000" fill="url(#ground)"/>
  <rect width="800" height="1000" fill="url(#grain)"/>

  <!-- inset frame -->
  <rect x="24" y="24" width="752" height="952" fill="none" stroke="#b18f5a" stroke-width="1"/>
  <rect x="31" y="31" width="738" height="938" fill="none" stroke="#e2d7c5" stroke-width="1"/>

  <!-- soft warm halos behind candles -->
  <circle cx="240" cy="430" r="190" fill="url(#halo)"/>
  <circle cx="400" cy="380" r="230" fill="url(#halo)"/>
  <circle cx="560" cy="440" r="190" fill="url(#halo)"/>
  <circle cx="400" cy="400" r="300" fill="url(#halo2)"/>

  <!-- ====== CANDLES ====== -->
  <!-- left candle (short) -->
  <g stroke="#b18f5a" stroke-width="1.4" fill="url(#wax)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M226 470 L254 470 L252 690 L228 690 Z"/>
  </g>
  <line x1="240" y1="470" x2="240" y2="452" stroke="#29251f" stroke-width="1.6"/>
  <g filter="url(#soft)">
    <path d="M240 452 C232 438 234 426 240 414 C246 426 248 438 240 452 Z" fill="url(#flame)" stroke="#b18f5a" stroke-width="0.8"/>
  </g>
  <circle cx="240" cy="430" r="20" fill="#c8a96f" opacity="0.30"/>

  <!-- center candle (tall) -->
  <g stroke="#b18f5a" stroke-width="1.4" fill="url(#wax)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M384 410 L416 410 L414 700 L386 700 Z"/>
  </g>
  <line x1="400" y1="410" x2="400" y2="388" stroke="#29251f" stroke-width="1.6"/>
  <g filter="url(#soft)">
    <path d="M400 388 C390 370 392 354 400 338 C408 354 410 370 400 388 Z" fill="url(#flame)" stroke="#b18f5a" stroke-width="0.8"/>
  </g>
  <circle cx="400" cy="362" r="24" fill="#c8a96f" opacity="0.32"/>

  <!-- right candle (medium) -->
  <g stroke="#b18f5a" stroke-width="1.4" fill="url(#wax)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M546 450 L574 450 L572 695 L548 695 Z"/>
  </g>
  <line x1="560" y1="450" x2="560" y2="430" stroke="#29251f" stroke-width="1.6"/>
  <g filter="url(#soft)">
    <path d="M560 430 C551 414 553 400 560 386 C567 400 569 414 560 430 Z" fill="url(#flame)" stroke="#b18f5a" stroke-width="0.8"/>
  </g>
  <circle cx="560" cy="408" r="20" fill="#c8a96f" opacity="0.30"/>

  <!-- subtle drip highlights -->
  <g stroke="#fffefb" stroke-width="1" fill="none" opacity="0.7">
    <path d="M392 430 C390 460 396 480 393 510"/>
    <path d="M234 500 C232 520 237 535 234 558"/>
    <path d="M554 510 C552 528 557 542 554 562"/>
  </g>

  <!-- base shadow line -->
  <line x1="180" y1="700" x2="620" y2="700" stroke="#e2d7c5" stroke-width="1"/>

  <!-- ====== BOTANICAL SPRIGS ====== -->
  <g fill="none" stroke="#b18f5a" stroke-width="1.4" stroke-linecap="round">
    <!-- left sprig -->
    <path d="M150 760 C170 660 175 560 188 470"/>
    <g stroke="#c8a96f" stroke-width="1.2">
      <path d="M160 700 C140 690 126 700 118 720"/>
      <path d="M168 650 C150 638 134 646 126 666"/>
      <path d="M176 596 C158 586 142 594 134 614"/>
      <path d="M181 544 C166 532 150 540 142 560"/>
    </g>
    <g fill="#e3cfc7" stroke="none" opacity="0.85">
      <ellipse cx="140" cy="708" rx="13" ry="6" transform="rotate(-26 140 708)"/>
      <ellipse cx="148" cy="656" rx="12" ry="5.5" transform="rotate(-26 148 656)"/>
      <ellipse cx="156" cy="602" rx="12" ry="5.5" transform="rotate(-26 156 602)"/>
      <ellipse cx="162" cy="550" rx="11" ry="5" transform="rotate(-26 162 550)"/>
    </g>

    <!-- right sprig -->
    <path d="M650 760 C630 660 625 560 612 470"/>
    <g stroke="#c8a96f" stroke-width="1.2">
      <path d="M640 700 C660 690 674 700 682 720"/>
      <path d="M632 650 C650 638 666 646 674 666"/>
      <path d="M624 596 C642 586 658 594 666 614"/>
      <path d="M619 544 C634 532 650 540 658 560"/>
    </g>
    <g fill="#e3cfc7" stroke="none" opacity="0.85">
      <ellipse cx="660" cy="708" rx="13" ry="6" transform="rotate(26 660 708)"/>
      <ellipse cx="652" cy="656" rx="12" ry="5.5" transform="rotate(26 652 656)"/>
      <ellipse cx="644" cy="602" rx="12" ry="5.5" transform="rotate(26 644 602)"/>
      <ellipse cx="638" cy="550" rx="11" ry="5" transform="rotate(26 638 550)"/>
    </g>
  </g>

  <!-- small inner foreground sprigs near base -->
  <g fill="none" stroke="#c8a96f" stroke-width="1.1" stroke-linecap="round" opacity="0.9">
    <path d="M300 705 C310 760 308 800 320 840"/>
    <path d="M312 760 C296 752 286 760 280 776"/>
    <path d="M316 800 C300 792 290 800 284 816"/>
    <path d="M500 705 C490 760 492 800 480 840"/>
    <path d="M488 760 C504 752 514 760 520 776"/>
    <path d="M484 800 C500 792 510 800 516 816"/>
  </g>
  <g fill="#e3cfc7" stroke="none" opacity="0.8">
    <ellipse cx="290" cy="762" rx="9" ry="4" transform="rotate(-20 290 762)"/>
    <ellipse cx="294" cy="804" rx="9" ry="4" transform="rotate(-20 294 804)"/>
    <ellipse cx="510" cy="762" rx="9" ry="4" transform="rotate(20 510 762)"/>
    <ellipse cx="506" cy="804" rx="9" ry="4" transform="rotate(20 506 804)"/>
  </g>

  <!-- faint sparse dot texture -->
  <g fill="#b18f5a" opacity="0.05">
    <circle cx="120" cy="200" r="2"/>
    <circle cx="680" cy="240" r="2"/>
    <circle cx="200" cy="880" r="2"/>
    <circle cx="600" cy="860" r="2"/>
    <circle cx="400" cy="160" r="2"/>
    <circle cx="320" cy="900" r="1.6"/>
    <circle cx="500" cy="910" r="1.6"/>
    <circle cx="150" cy="430" r="1.6"/>
    <circle cx="660" cy="470" r="1.6"/>
  </g>

  <!-- centered minimal serif ornament -->
  <g fill="#b18f5a" opacity="0.7">
    <circle cx="400" cy="900" r="2.4"/>
    <path d="M360 900 L392 900 M408 900 L440 900" stroke="#b18f5a" stroke-width="1" fill="none"/>
  </g>
</svg>
