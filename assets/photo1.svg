<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sunrise" cx="50%" cy="62%" r="62%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="34%" stop-color="#f5f1ea"/>
      <stop offset="70%" stop-color="#efe7da"/>
      <stop offset="100%" stop-color="#e7ddcc"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7da" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e3d8c4" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#fffefb" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#f6efe2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f5f1ea" stop-opacity="0"/>
    </radialGradient>
    <!-- Бусад хавтгайтай нэг өнгөний хүрээнд: цайвар алт/чавганы тон, бараан масс биш -->
    <linearGradient id="couple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e7d4"/>
      <stop offset="100%" stop-color="#e7d4b8"/>
    </linearGradient>
    <linearGradient id="coupleStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a96f"/>
      <stop offset="100%" stop-color="#b18f5a"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ground -->
  <rect width="800" height="1000" fill="url(#sunrise)"/>
  <rect width="800" height="1000" fill="url(#ground)"/>
  <rect x="120" y="240" width="560" height="560" fill="url(#glow)"/>

  <!-- whisper-soft grain -->
  <rect width="800" height="1000" filter="url(#grain)" opacity="0.5"/>

  <!-- sparse faint dots -->
  <g fill="#b18f5a" opacity="0.05">
    <circle cx="150" cy="180" r="2"/><circle cx="650" cy="160" r="1.6"/>
    <circle cx="220" cy="120" r="1.4"/><circle cx="560" cy="220" r="1.8"/>
    <circle cx="700" cy="320" r="1.4"/><circle cx="110" cy="360" r="1.6"/>
    <circle cx="400" cy="90" r="1.4"/><circle cx="320" cy="200" r="1.2"/>
    <circle cx="480" cy="130" r="1.5"/><circle cx="90" cy="520" r="1.4"/>
    <circle cx="710" cy="540" r="1.4"/>
  </g>

  <!-- inset thin gold frame -->
  <rect x="24" y="24" width="752" height="952" fill="none" stroke="#b18f5a" stroke-width="1" opacity="0.85"/>
  <rect x="31" y="31" width="738" height="938" fill="none" stroke="#e2d7c5" stroke-width="1" opacity="0.7"/>

  <!-- ============ FLORAL / LEAFY ARCH ============ -->
  <g fill="none" stroke="#b18f5a" stroke-width="1.6" stroke-linecap="round">
    <!-- main arch sweep -->
    <path d="M150 760 C120 470 250 240 400 222 C550 240 680 470 650 760"
          stroke="#c8a96f" stroke-width="2" opacity="0.9"/>
    <!-- inner companion line -->
    <path d="M178 760 C152 488 268 274 400 258 C532 274 648 488 622 760"
          stroke="#e2d7c5" stroke-width="1.2" opacity="0.85"/>
  </g>

  <!-- leaves & blossoms along the arch -->
  <g stroke-linecap="round">
    <!-- helper leaf clusters drawn with paths -->
    <g fill="#c8a96f" opacity="0.85">
      <!-- crown blossoms -->
      <g transform="translate(400 222)">
        <g fill="#e3cfc7" opacity="0.9">
          <ellipse cx="0" cy="-14" rx="9" ry="14"/>
          <ellipse cx="13" cy="-4" rx="9" ry="14" transform="rotate(72 13 -4)"/>
          <ellipse cx="8" cy="12" rx="9" ry="14" transform="rotate(144 8 12)"/>
          <ellipse cx="-8" cy="12" rx="9" ry="14" transform="rotate(216 -8 12)"/>
          <ellipse cx="-13" cy="-4" rx="9" ry="14" transform="rotate(288 -13 -4)"/>
        </g>
        <circle cx="0" cy="0" r="5" fill="#b18f5a"/>
      </g>
    </g>

    <!-- leaf sprigs (mirrored on both legs) -->
    <g fill="#b18f5a" opacity="0.55">
      <!-- left side leaves -->
      <path d="M180 360 q-26 -10 -42 4 q22 8 42 -4 Z"/>
      <path d="M168 460 q-28 -6 -44 12 q24 4 44 -12 Z"/>
      <path d="M160 560 q-28 -2 -42 18 q24 0 42 -18 Z"/>
      <path d="M210 300 q-22 -16 -40 -6 q20 14 40 6 Z"/>
      <!-- right side leaves -->
      <path d="M620 360 q26 -10 42 4 q-22 8 -42 -4 Z"/>
      <path d="M632 460 q28 -6 44 12 q-24 4 -44 -12 Z"/>
      <path d="M640 560 q28 -2 42 18 q-24 0 -42 -18 Z"/>
      <path d="M590 300 q22 -16 40 -6 q-20 14 -40 6 Z"/>
    </g>

    <!-- small blossoms along arch -->
    <g fill="#e3cfc7" opacity="0.75">
      <circle cx="262" cy="262" r="7"/><circle cx="538" cy="262" r="7"/>
      <circle cx="206" cy="392" r="6"/><circle cx="594" cy="392" r="6"/>
      <circle cx="180" cy="520" r="5"/><circle cx="620" cy="520" r="5"/>
      <circle cx="330" cy="218" r="6"/><circle cx="470" cy="218" r="6"/>
    </g>
    <g fill="#b18f5a" opacity="0.6">
      <circle cx="262" cy="262" r="2"/><circle cx="538" cy="262" r="2"/>
      <circle cx="206" cy="392" r="2"/><circle cx="594" cy="392" r="2"/>
      <circle cx="180" cy="520" r="1.8"/><circle cx="620" cy="520" r="1.8"/>
      <circle cx="330" cy="218" r="2"/><circle cx="470" cy="218" r="2"/>
    </g>
  </g>

  <!-- ============ COUPLE SILHOUETTE ============ -->
  <g>
    <!-- soft halo behind couple -->
    <ellipse cx="400" cy="560" rx="150" ry="200" fill="url(#glow)" opacity="0.7"/>

    <g fill="url(#couple)" fill-opacity="0.55" stroke="url(#coupleStroke)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <!-- groom (left), facing slightly right -->
      <path d="M352 470
               c-3 -20 8 -38 30 -41
               c22 -3 36 12 37 32
               c1 12 -4 22 -12 28
               c12 6 20 18 22 34
               c4 30 6 90 5 160
               c-1 40 -3 78 -6 110
               l-44 0
               c-3 -60 -6 -130 -8 -176
               c-1 -28 -2 -56 -3 -84
               c-9 -3 -16 -10 -20 -20
               c-6 -16 -3 -55 12 -73
               c-6 -8 -8 -19 -8 -34 Z"/>

      <!-- bride (right), gown flaring -->
      <path d="M430 470
               c-4 -22 9 -40 32 -42
               c23 -2 38 14 38 34
               c0 14 -6 25 -16 31
               c12 7 19 20 22 38
               c3 22 6 48 16 92
               c14 60 30 118 44 178
               c-50 14 -110 14 -160 0
               c10 -42 18 -86 22 -130
               c3 -34 4 -74 4 -110
               c-9 -3 -16 -11 -19 -21
               c-5 -16 -2 -52 12 -70
               c-6 -8 -9 -18 -9 -33 Z"/>
    </g>

    <!-- subtle separation line between the two figures -->
    <path d="M414 446 c2 60 2 200 -2 300" fill="none" stroke="#b18f5a" stroke-width="1.1" opacity="0.4"/>

    <!-- veil hint flowing from bride -->
    <path d="M500 470 c40 30 52 120 40 290 c-2 30 -6 60 -12 86"
          fill="none" stroke="#e3cfc7" stroke-width="1.2" opacity="0.35"/>

    <!-- small bouquet held between them -->
    <g opacity="0.85">
      <circle cx="408" cy="618" r="9" fill="#e3cfc7"/>
      <circle cx="396" cy="624" r="6" fill="#c8a96f"/>
      <circle cx="420" cy="624" r="6" fill="#c8a96f"/>
      <circle cx="408" cy="630" r="5" fill="#e3cfc7"/>
      <path d="M408 634 q-2 40 -2 70" fill="none" stroke="#b18f5a" stroke-width="1.2" opacity="0.6"/>
    </g>
  </g>

  <!-- ground line + reflection softening -->
  <path d="M210 838 Q400 858 590 838" fill="none" stroke="#e2d7c5" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="400" cy="842" rx="120" ry="10" fill="#29251f" opacity="0.06" filter="url(#soft)"/>

  <!-- delicate flourish beneath -->
  <g stroke="#b18f5a" fill="none" opacity="0.65" stroke-linecap="round">
    <path d="M330 888 Q400 902 470 888"/>
    <path d="M360 888 Q400 880 440 888"/>
    <circle cx="400" cy="888" r="2.2" fill="#b18f5a" stroke="none"/>
    <circle cx="318" cy="888" r="1.6" fill="#b18f5a" stroke="none"/>
    <circle cx="482" cy="888" r="1.6" fill="#b18f5a" stroke="none"/>
  </g>
</svg>
