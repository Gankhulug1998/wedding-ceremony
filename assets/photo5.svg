<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ground" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="42%" stop-color="#f5f1ea"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </radialGradient>
    <radialGradient id="spot" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#fffefb" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#fff8ec" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#efe7da" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#efe7da" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a96f"/>
      <stop offset="100%" stop-color="#b18f5a"/>
    </linearGradient>
    <radialGradient id="floorshade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#29251f" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#29251f" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#29251f" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.5 0"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="800" height="1000" fill="url(#ground)"/>

  <!-- circular spotlight glow -->
  <circle cx="400" cy="460" r="360" fill="url(#spot)"/>

  <!-- whisper-soft grain -->
  <rect x="0" y="0" width="800" height="1000" filter="url(#grain)" opacity="0.05"/>

  <!-- sparse faint dots -->
  <g fill="#b18f5a" opacity="0.05">
    <circle cx="150" cy="200" r="2"/>
    <circle cx="640" cy="250" r="2.5"/>
    <circle cx="120" cy="560" r="2"/>
    <circle cx="690" cy="600" r="2"/>
    <circle cx="220" cy="820" r="2.2"/>
    <circle cx="580" cy="840" r="2"/>
    <circle cx="400" cy="120" r="2"/>
  </g>

  <!-- floor shadow under the couple -->
  <ellipse cx="400" cy="760" rx="190" ry="34" fill="url(#floorshade)"/>

  <!-- COUPLE first-dance silhouette (бусад хавтгайтай нэг тоны алтан шугаман зураг) -->
  <g>
    <!-- цайвар тоны дүүргэлт + алтан тойм; бараан масс биш -->
    <g fill="#ead9bb" fill-opacity="0.5" stroke="url(#goldline)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <!-- Partner A (leading, left) -->
      <path d="M352 392
               c-3-16 4-32 18-39
               c14-7 31-3 39 10
               c7 11 6 26-2 36
               c-6 8-16 12-26 11
               c-13-1-25-12-29-18z" opacity="0" stroke="none"/>
      <!-- combined silhouette built as one elegant form -->
      <path d="M300 760
               c-2-28 0-72 6-104
               c4-22 12-44 24-58
               c8-9 18-15 28-18
               c-10-6-17-17-17-30
               c0-19 15-34 34-34
               c19 0 34 15 34 34
               c0 11-5 21-13 27
               c14 3 27 11 37 24
               c5 7 9 14 12 22
               c8-14 19-25 33-31
               c6-3 13-5 19-6
               c-11-5-19-16-19-29
               c0-19 15-34 34-34
               c19 0 34 15 34 34
               c0 12-6 22-15 28
               c14 5 26 16 33 31
               c11 22 16 52 18 84
               c1 18 1 36 0 54
               l-22 0
               c-1-26-2-52-7-74
               c-3-15-9-30-18-39
               l-2 113
               l-26 0
               l-3-128
               c-9 4-17 11-23 21
               c-9 14-13 33-15 54
               c-2 20-2 41-2 60
               l-24 0
               c0-22 0-46-3-67
               c-2-17-7-33-15-45
               c-6-9-14-16-23-20
               l-3 132
               l-26 0
               l-2-116
               c-9 9-15 24-19 40
               c-5 22-6 49-7 76
               z"/>
    </g>

    <!-- crisp engraving outline accents (thin gold-line) -->
    <g fill="none" stroke="url(#goldline)" stroke-width="1.1" opacity="0.5" stroke-linecap="round">
      <!-- the leaning embrace gesture line between heads -->
      <path d="M360 232 q34-26 80-4"/>
      <!-- skirt/flow sweep -->
      <path d="M470 470 q34 60 30 140"/>
      <path d="M330 470 q-30 50 -28 130"/>
    </g>

    <!-- delicate veil / dress trail line -->
    <g fill="none" stroke="#b18f5a" stroke-width="0.9" opacity="0.4" filter="url(#soft)">
      <path d="M300 758 q60-18 120-2 q60 16 120-2"/>
    </g>
  </g>

  <!-- floating sparkles (4-point stars) -->
  <g fill="#c8a96f" opacity="0.85">
    <path d="M250 300 l4 14 l14 4 l-14 4 l-4 14 l-4-14 l-14-4 l14-4 z"/>
    <path d="M560 360 l3 10 l10 3 l-10 3 l-3 10 l-3-10 l-10-3 l10-3 z" opacity="0.7"/>
    <path d="M520 250 l2.5 8 l8 2.5 l-8 2.5 l-2.5 8 l-2.5-8 l-8-2.5 l8-2.5 z" opacity="0.6"/>
    <path d="M300 420 l2 7 l7 2 l-7 2 l-2 7 l-2-7 l-7-2 l7-2 z" opacity="0.55"/>
    <path d="M610 480 l2 7 l7 2 l-7 2 l-2 7 l-2-7 l-7-2 l7-2 z" opacity="0.5"/>
  </g>

  <!-- tiny sparkle dots -->
  <g fill="#b18f5a" opacity="0.45">
    <circle cx="470" cy="190" r="1.6"/>
    <circle cx="330" cy="210" r="1.4"/>
    <circle cx="620" cy="300" r="1.4"/>
    <circle cx="210" cy="380" r="1.4"/>
  </g>

  <!-- thin inset gold frame, ~24px inset -->
  <rect x="24" y="24" width="752" height="952" fill="none" stroke="url(#goldline)" stroke-width="1" opacity="0.85"/>
  <rect x="30" y="30" width="740" height="940" fill="none" stroke="#e2d7c5" stroke-width="0.6" opacity="0.7"/>
</svg>
